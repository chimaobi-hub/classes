<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classwork</title>
</head>
<link rel="stylesheet" href="Emmanuel.css"
<body>
    <form action="/submit"method="post">
        <label for="name">name:</label>
        <input type="name" id="name" name="name" placeholder="enter your name here" required><br>
        <label  for="email">email</label>
        <input type="text" id="email" name="email" placeholder="enter your email here" required><br>
        <label for="password">password</label>
        <input type="text" id="password" name="password" placeholder="enter your password here" required><br>
        <fieldset>
            <legend>gender</legend>
        <label for="male">male</label>
        <input type="radio" id="male" name="gender" value="gender"><br>
        <label for="female">female</label>
        <input type="radio" id="female" name="gender" value="gender"><br>
        <label for="other">other</label>
        <input type="radio" id="other" name="gender" value="gender">
        </fieldset>
        <fieldset>
            <legend>interest</legend>
            <label for="sports">sport</label>
            <input type="checkbox" id="sport" name="interest" value="sports"><br>
            <label for="music">music</label>
            <input type="checkbox" id="music" name="interest" value="music"><br>
            <label for="book">book</label>
            <input type="checkbox" id="book" name="interest" value="book">
        </fieldset>
          <form type="submit" value="submit"></form> 
    </form>
    
    
</body>
</html>
